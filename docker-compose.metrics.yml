name: money-tracker-metrics

# Запуск:   docker compose -f docker-compose.metrics.yml up -d
# Остановка: docker compose -f docker-compose.metrics.yml down
#
# Prometheus:   http://localhost:9090  — UI для проверки метрик и статуса таргетов
# Grafana:      http://localhost:3001  — дашборды (логин: admin / пароль: admin)
# Pushgateway:  http://localhost:9091  — UI для просмотра запушенных метрик
#
# Требования:
#   - Rails приложение запущено локально на порту 3000 (bundle exec rails s)
#   - Rake-таска бота запущена локально (bundle exec rake money_tracker:start)

services:
  prometheus:
    image: prom/prometheus:v2.51.0  # фиксируем версию чтобы избежать сюрпризов при обновлении

    ports:
      - "9090:9090"  # UI Prometheus доступен на http://localhost:9090

    volumes:
      # Монтируем наш конфиг вместо дефолтного.
      # :ro — read-only, контейнер не сможет изменить файл на хосте.
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

      # Именованный volume для хранения данных метрик между рестартами контейнера.
      # Без этого все накопленные данные теряются при docker compose down.
      - prometheus_data:/prometheus

    command:
      # Путь к конфигу внутри контейнера.
      - '--config.file=/etc/prometheus/prometheus.yml'

      # Путь для хранения данных (TSDB — time series database).
      - '--storage.tsdb.path=/prometheus'

      # Сколько хранить данные. 15 дней достаточно для локальной разработки.
      # Для продакшна обычно 30-90 дней.
      - '--storage.tsdb.retention.time=15d'

      # Включает веб-UI и API. Без этого флага интерфейс недоступен.
      - '--web.enable-lifecycle'

    # Проверяем что Prometheus поднялся и отвечает на запросы
    # прежде чем Grafana попытается к нему подключиться.
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

    # Позволяет контейнеру обращаться к host.docker.internal (localhost хост-машины).
    # Нужно чтобы Prometheus мог достучаться до Rails на порту 3000.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    depends_on:
      pushgateway:
        condition: service_started

  pushgateway:
    image: prom/pushgateway:v1.8.0

    ports:
      - "9091:9091"  # UI Pushgateway доступен на http://localhost:9091

    # Pushgateway не хранит данные на диске — при рестарте все метрики теряются.
    # Для локальной разработки это приемлемо.

  grafana:
    image: grafana/grafana:10.4.0  # фиксируем версию

    ports:
      - "3001:3000"  # 3001 на хосте, чтобы не конфликтовать с Rails на порту 3000

    volumes:
      # Сохраняем данные Grafana (дашборды, настройки, пользователи) между рестартами.
      - grafana_data:/var/lib/grafana

    environment:
      # Логин и пароль администратора по умолчанию.
      # Для локальной разработки оставляем простые значения.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

      # Отключаем обязательную смену пароля при первом входе — удобно для локалки.
      - GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION=false

      # Разрешаем анонимный доступ — не нужен логин для просмотра дашбордов локально.
      # Для продакшна это нужно выключить.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer

    depends_on:
      prometheus:
        # Grafana стартует только после того как Prometheus прошёл healthcheck.
        condition: service_healthy

volumes:
  # Именованные volumes управляются Docker — данные живут между docker compose down/up.
  # Удалить можно командой: docker volume rm money-tracker-prometheus_prometheus_data
  prometheus_data:
  grafana_data:
