name: money-tracker

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: money_tracker_docker_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: docker_test
      SECRET_KEY_BASE: docker_test_secret_key_base
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DOCKER_TEST_DB_NAME: money_tracker_docker_test
    command: bundle exec rails db:prepare

  rubocop:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      RAILS_ENV: docker_test
      SECRET_KEY_BASE: docker_test_secret_key_base
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DOCKER_TEST_DB_NAME: money_tracker_docker_test
    command: bundle exec rubocop -c .rubocop.yml

  spec:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      rubocop:
        condition: service_completed_successfully
    environment:
      RAILS_ENV: docker_test
      SECRET_KEY_BASE: docker_test_secret_key_base
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DOCKER_TEST_DB_NAME: money_tracker_docker_test
    command: bundle exec rspec
volumes:
  postgres_data:
