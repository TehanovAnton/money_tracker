plugins:
  - rubocop-factory_bot
  - rubocop-rails
  - rubocop-rspec
  - rubocop-rspec_rails

require:
  - ./lib/rubocop/cop/money_tracker/decorator_file_name.rb

AllCops:
  NewCops: disable
  Exclude:
    - 'vendor/bundle/**/*'
    - 'vendor/**/*'
    - 'bin/**/*'
    - 'config/**/*'
    - 'db/**/*'


Metrics/BlockLength:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/ClassAndModuleChildren:
  Enabled: false

RSpec/NestedGroups:
  Enabled: false

RSpec/LeakyLocalVariable:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

RSpec/NamedSubject:
  Enabled: false

RSpec/ExampleLength:
  Enabled: false

RSpec/LetSetup:
  Enabled: false

Rails/Exit:
  Exclude:
    - 'spec/rails_helper.rb'

MoneyTracker/DecoratorFileName:
  Enabled: true
  Include:
    - 'app/decorators/**/*.rb'
