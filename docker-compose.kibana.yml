name: money-tracker-kibana

# Запуск: docker compose -f docker-compose.kibana.yml up -d
# Остановка: docker compose -f docker-compose.kibana.yml down
#
# Kibana: http://localhost:5601
# Elasticsearch: http://localhost:9200

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node       # одна нода, не кластер
      - xpack.security.enabled=false     # отключаем TLS и пароли для локалки
      - ES_JAVA_OPTS=-Xms512m -Xmx512m  # ограничиваем память JVM
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    user: root  # нужен root для чтения файлов с хоста
    volumes:
      # конфиг Filebeat
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      # папка с логами Rails с хоста (read-only)
      - ./log:/app/log:ro
      # реестр прочитанных файлов — сохраняется между рестартами контейнера,
      # чтобы Filebeat не перечитывал уже отправленные строки заново
      - filebeat_registry:/usr/share/filebeat/data
    depends_on:
      elasticsearch:
        condition: service_healthy
    command: filebeat -e --strict.perms=false

volumes:
  elasticsearch_data:
  filebeat_registry:
