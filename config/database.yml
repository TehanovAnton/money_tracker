<%
postgres_settings = nil
begin
  postgres_settings = Settings&.app&.db&.postgresql if defined?(Settings)
rescue NoMethodError
  postgres_settings = nil
end

db_adapter = ENV.fetch('DB_ADAPTER', postgres_settings&.adapter || 'postgresql')
db_pool = ENV.fetch('DB_POOL', postgres_settings&.pool || 5)
db_username = ENV.fetch('DB_USERNAME', postgres_settings&.username || 'postgres')
db_password = ENV['DB_PASSWORD'] || postgres_settings&.password
db_timeout = ENV.fetch('DB_TIMEOUT', postgres_settings&.timeout || 5000)
db_encoding = ENV.fetch('DB_ENCODING', postgres_settings&.encoding || 'utf8')
db_reconnect = ENV.fetch('DB_RECONNECT', postgres_settings&.reconnect || false)
db_host = ENV.fetch('DATABASE_HOST', postgres_settings&.host || 'localhost')
%>

default: &default
  adapter: <%= db_adapter %>
  pool: <%= db_pool %>
  username: <%= db_username %>
  password: <%= db_password %>
  timeout: <%= db_timeout %>
  encoding: <%= db_encoding %>
  reconnect: <%= db_reconnect %>
  host: <%= db_host %>

development:
  <<: *default
  database: <%= ENV.fetch('DEV_DB_NAME', postgres_settings&.db_name || 'money_tracker_development') %>

test:
  <<: *default
  database: <%= ENV.fetch('TEST_DB_NAME', postgres_settings&.db_name || 'money_tracker_test') %>

docker_test:
  <<: *default
  database: <%= ENV.fetch('DOCKER_TEST_DB_NAME', postgres_settings&.db_name || 'money_tracker_docker_test') %>

production:
  <<: *default
  database: <%= ENV.fetch('PROD_DB_NAME', postgres_settings&.db_name || 'money_tracker_production') %>
